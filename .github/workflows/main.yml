name: Build Android APK

on:
  push:
    branches: [ "main", "master" ] # আপনার মেইন ব্রাঞ্চের নাম অনুযায়ী পরিবর্তন করতে পারেন
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Project & Build APK
        run: |
          cordova create app com.abdul.toolshub RMZ_Tools
          cd app
          cordova platform add android
          rm -rf www/*
          cp -r ../* www/ || true
          cordova build android --release

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: RMZ_Tools_APK
          path: app/platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk
