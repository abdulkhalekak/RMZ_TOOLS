name: Build Android APK (Modern Webview)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Native Webview Project
        run: |
          # অ্যান্ড্রয়েড প্রোজেক্ট স্ট্রাকচার তৈরি
          mkdir -p app/src/main/java/com/abdul/toolshub
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/assets

          # index.html ফাইলটি assets ফোল্ডারে কপি করা
          cp index.html app/src/main/assets/index.html || cp *.html app/src/main/assets/index.html

          # Main Activity (Java Code) তৈরি করা
          cat << 'EOF' > app/src/main/java/com/abdul/toolshub/MainActivity.java
          package com.abdul.toolshub;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState) ;
                  WebView webView = new WebView(this);
                  WebSettings webSettings = webView.getSettings();
                  webSettings.setJavaScriptEnabled(true);
                  webSettings.setDomStorageEnabled(true);
                  webSettings.setAllowFileAccess(true);
                  webView.setWebViewClient(new WebViewClient());
                  webView.loadUrl("file:///android_asset/index.html");
                  setContentView(webView);
              }
          }
          EOF

          # AndroidManifest.xml তৈরি করা
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.abdul.toolshub">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application android:label="RMZ Tools" android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # settings.gradle তৈরি করা
          echo "include ':app'" > settings.gradle

          # build.gradle (Project) তৈরি করা
          cat << 'EOF' > build.gradle
          buildscript {
              repositories { google() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.1' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          # build.gradle (App) তৈরি করা
          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.abdul.toolshub'
              compileSdk 34
              defaultConfig {
                  applicationId "com.abdul.toolshub"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Build with Gradle
        run: |
          chmod +x   # প্রোজেক্টে গ্র্যাডেল সেটআপ ও বিল্ড
          gradle wrapper --gradle-version 8.1.1
          ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: RMZ_Tools_APK
          path: app/build/outputs/apk/debug/app-debug.apk
