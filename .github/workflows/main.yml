name: Build Android APK (Modern Webview)
on: 
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-33 build-tools;33.0.0'
      
      - name: Install Cordova
        run: |
          npm install -g cordova@latest
          cordova --version
      
      - name: Create Cordova Project
        run: |
          cordova create app com.rmzteam.toolshub "RMZ Tools Hub"
          cd app
          cordova platform add android@latest
          
          # Clean and copy files
          rm -rf www/*
          cp ../index.html www/index.html
          
          # Copy any assets if exists
          [ -d "../assets" ] && cp -r ../assets www/ || true
          [ -d "../css" ] && cp -r ../css www/ || true
          [ -d "../js" ] && cp -r ../js www/ || true
          
          # Create config.xml
          cat > config.xml << 'EOF'
          <?xml version='1.0' encoding='utf-8'?>
          <widget id="com.rmzteam.toolshub" version="1.0.1" xmlns="http://www.w3.org/ns/widgets" xmlns:cdv="http://cordova.apache.org/ns/1.0">
              <name>RMZ Tools Hub</name>
              <description>Email Extractor, Cookie to UID, 2FA Generator & More</description>
              <author email="rmzteam@proton.me" href="https://t.me/realmoneyincomezone">RMZ Team</author>
              <content src="index.html" />
              <access origin="*" />
              <allow-intent href="http://*/*" />
              <allow-intent href="https://*/*" />
              <allow-intent href="tel:*" />
              <allow-intent href="sms:*" />
              <allow-intent href="mailto:*" />
              <allow-intent href="geo:*" />
              <platform name="android">
                  <allow-intent href="market:*" />
                  <preference name="android-minSdkVersion" value="21" />
                  <preference name="android-targetSdkVersion" value="33" />
                  <preference name="android-compileSdkVersion" value="33" />
              </platform>
              <preference name="Orientation" value="default" />
              <preference name="Fullscreen" value="false" />
              <preference name="StatusBarBackgroundColor" value="#1abc9c" />
              <preference name="StatusBarStyle" value="lightcontent" />
          </widget>
          EOF
          
          # Add necessary plugins
          cordova plugin add cordova-plugin-whitelist@1.3.5
          cordova plugin add cordova-plugin-inappbrowser@5.0.0
          
          # Build
          cordova build android --release
      
      - name: Sign APK and Align
        run: |
          cd app/platforms/android/app/build/outputs/apk/release/
          
          # Generate keystore if not exists
          if [ ! -f debug.keystore ]; then
            keytool -genkey -v -keystore debug.keystore -alias debug -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=RMZ Team, OU=Dev, O=RMZ, L=Dhaka, ST=Dhaka, C=BD"
          fi
          
          # Sign the APK
          jarsigner -verbose -sigalg SHA1withRSA -digestalg SHA1 -keystore debug.keystore -storepass android -keypass android app-release-unsigned.apk debug
          
          # Zipalign (find correct path)
          ZIPALIGN_PATH=$(find $ANDROID_HOME/build-tools -name "zipalign" | head -1)
          if [ -z "$ZIPALIGN_PATH" ]; then
            echo "zipalign not found, installing..."
            sudo apt-get install -y zipalign
            ZIPALIGN_PATH="zipalign"
          fi
          
          $ZIPALIGN_PATH -v -p 4 app-release-unsigned.apk RMZ-Tools-Hub-v1.0.1.apk
          
          # Move to root
          cp RMZ-Tools-Hub-v1.0.1.apk ../../../../../../../
      
      - name: List files (Debug)
        run: |
          echo "Files in root:"
          ls -la *.apk 2>/dev/null || echo "No APK found in root"
          echo ""
          echo "Files in build folder:"
          ls -la app/platforms/android/app/build/outputs/apk/release/ 2>/dev/null || echo "Folder not found"
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RMZ-Tools-Hub-APK
          path: |
            *.apk
            app/platforms/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          compression-level: 0
          retention-days: 30
